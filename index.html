<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Simple Weather App</title>
  <style>
    :root{
      --bg:#0f172a; /* slate-900 */
      --card:#0b1220;
      --accent:#06b6d4; /* cyan-400 */
      --muted:#94a3b8;
      --glass: rgba(255,255,255,0.03);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial;
    }
    *{box-sizing:border-box}
    html,body{height:100%;}
    body{
      margin:0;
      background: linear-gradient(180deg,#021225 0%, #07162a 60%);
      color:#e6eef6;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:24px;
    }

    .container{
      width:100%;
      max-width:760px;
      background:linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));
      border-radius:14px;
      padding:20px;
      box-shadow: 0 10px 30px rgba(2,6,23,0.6);
      border: 1px solid rgba(255,255,255,0.03);
    }

    header{
      display:flex;
      align-items:center;
      gap:12px;
      margin-bottom:18px;
    }
    header h1{margin:0;font-size:20px;letter-spacing:0.2px}
    .controls{
      display:flex;
      gap:8px;
      margin-bottom:16px;
      align-items:center;
    }
    .controls input[type="text"]{
      flex:1;
      min-width:0;
      padding:10px 12px;
      border-radius:10px;
      border:1px solid rgba(255,255,255,0.06);
      background:var(--glass);
      color:inherit;
      font-size:15px;
      outline:none;
    }
    .controls button{
      padding:10px 14px;
      border-radius:10px;
      border:0;
      background:var(--accent);
      color:#022;
      font-weight:600;
      cursor:pointer;
      transition:transform .12s ease;
    }
    .controls button:active{transform:translateY(1px)}

    .card{
      display:flex;
      gap:18px;
      align-items:center;
      padding:16px;
      border-radius:12px;
      background:linear-gradient(180deg, rgba(255,255,255,0.015), rgba(255,255,255,0.01));
      border:1px solid rgba(255,255,255,0.03);
    }
    .location{
      flex:1;
    }
    .location h2{margin:0;font-size:18px}
    .meta{color:var(--muted);font-size:13px;margin-top:4px}

    .temp{
      display:flex;
      align-items:center;
      gap:12px;
      font-weight:700;
    }
    .temp .value{font-size:36px}
    .condition{font-size:14px;color:var(--muted)}

    .extras{
      display:flex;
      gap:12px;
      margin-top:10px;
      color:var(--muted);
      font-size:13px;
    }

    .hidden{display:none}
    .error{
      margin-top:12px;
      color:#ffb4b4;
      background:rgba(255, 180, 180, 0.04);
      padding:10px 12px;border-radius:8px;border:1px solid rgba(255,180,180,0.06)
    }

    .loader{
      width:20px;height:20px;border-radius:50%;border:3px solid rgba(255,255,255,0.12);border-top-color:var(--accent);animation:spin .9s linear infinite;
    }
    @keyframes spin{to{transform:rotate(360deg)}}

    footer{margin-top:14px;color:var(--muted);font-size:13px;text-align:right}

    @media (max-width:520px){
      .temp .value{font-size:28px}
      .container{padding:14px}
      header h1{font-size:16px}
    }
  </style>
</head>
<body>
  <main class="container" role="main">
    <header>
      <svg width="36" height="36" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M12 3v2" stroke="#06b6d4" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/><path d="M12 19v2" stroke="#06b6d4" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/><path d="M4.2 4.2l1.4 1.4" stroke="#06b6d4" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/><path d="M18.4 18.4l1.4 1.4" stroke="#06b6d4" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/><path d="M1 12h2" stroke="#06b6d4" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/><path d="M21 12h2" stroke="#06b6d4" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/><path d="M4.2 19.8l1.4-1.4" stroke="#06b6d4" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/><path d="M18.4 5.6l1.4-1.4" stroke="#06b6d4" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/><circle cx="12" cy="12" r="3" stroke="#06b6d4" stroke-width="1.2"/></svg>
      <h1>Simple Weather App</h1>
    </header>

    <form id="searchForm" class="controls" aria-label="Search weather">
      <input id="locationInput" type="text" placeholder="Enter city name or postal code (e.g., London or 94040)" aria-label="Location" required />
      <button id="searchBtn" type="submit">Get Weather</button>
      <div id="loading" class="loader hidden" aria-hidden="true"></div>
    </form>

    <section id="result" class="card hidden" aria-live="polite">
      <div class="location">
        <h2 id="name">—</h2>
        <div class="meta" id="localtime">—</div>
        <div class="condition" id="text">—</div>
        <div class="extras">
          <div id="humidity">Humidity: —</div>
          <div id="wind">Wind: —</div>
          <div id="feelslike">Feels like: —</div>
        </div>
      </div>
      <div class="temp">
        <img id="icon" src="" alt="weather icon" width="64" height="64" />
        <div>
          <div class="value" id="temp_c">--°C</div>
          <div class="meta" id="temp_f">--°F</div>
        </div>
      </div>
    </section>

    <div id="error" class="error hidden" role="status"></div>

    <footer>Powered by WeatherAPI — example using the key you provided</footer>
  </main>

  <script>
    // ----- USER-SUPPLIED API KEY -----
    // The user gave this key in the chat. If you want to keep the key secret on a public site,
    // move requests to a server-side proxy.
    const API_KEY = '5dbc08c757054f06ab354534252511';
    const BASE = 'http://api.weatherapi.com/v1/current.json';

    const $ = id => document.getElementById(id);
    const form = $('searchForm');
    const input = $('locationInput');
    const result = $('result');
    const loading = $('loading');
    const errorBox = $('error');

    function showLoading(on=true){
      if(on){
        loading.classList.remove('hidden');
        $('searchBtn').disabled = true;
      } else {
        loading.classList.add('hidden');
        $('searchBtn').disabled = false;
      }
    }

    function showError(msg){
      errorBox.textContent = msg;
      errorBox.classList.remove('hidden');
    }
    function hideError(){ errorBox.classList.add('hidden'); errorBox.textContent = ''; }

    function render(data){
      if(!data) return;
      $('name').textContent = `${data.location.name}, ${data.location.country}`;
      $('localtime').textContent = `Local time: ${data.location.localtime}`;
      $('text').textContent = data.current.condition.text;
      $('icon').src = data.current.condition.icon.startsWith('//') ? 'https:'+data.current.condition.icon : data.current.condition.icon;
      $('icon').alt = data.current.condition.text + ' icon';
      $('temp_c').textContent = `${data.current.temp_c.toFixed(1)}°C`;
      $('temp_f').textContent = `${data.current.temp_f.toFixed(1)}°F`;
      $('humidity').textContent = `Humidity: ${data.current.humidity}%`;
      $('wind').textContent = `Wind: ${data.current.wind_kph} kph`;
      $('feelslike').textContent = `Feels like: ${data.current.feelslike_c.toFixed(1)}°C`;
      result.classList.remove('hidden');
    }

    async function fetchWeather(q){
      // Build URL safely
      const url = `${BASE}?key=${encodeURIComponent(API_KEY)}&q=${encodeURIComponent(q)}&aqi=no`;
      try{
        showLoading(true); hideError();
        const res = await fetch(url);
        if(!res.ok){
          // Try to parse error body from API
          let body;
          try{ body = await res.json(); } catch(e){ body = null; }
          const msg = body && body.error && body.error.message ? body.error.message : `Request failed (${res.status})`;
          throw new Error(msg);
        }
        const data = await res.json();
        render(data);
      }catch(err){
        result.classList.add('hidden');
        showError(err.message || 'Unknown error');
        console.error(err);
      }finally{
        showLoading(false);
      }
    }

    form.addEventListener('submit', e => {
      e.preventDefault();
      const q = input.value.trim();
      if(!q){
        showError('Please enter a location.');
        return;
      }
      fetchWeather(q);
    });

    // Bonus: allow pressing Enter while input focused
    input.addEventListener('keydown', e => {
      if(e.key === 'Enter'){
        // form submit will handle
      }
    });

    // Optional: prefill with "London" for first-time demo
    (function init(){
      input.value = '';
      // If you want to show a demo by default, uncomment the line below:
      // input.value = 'London'; fetchWeather('London');
    })();
  </script>
</body>
</html>
